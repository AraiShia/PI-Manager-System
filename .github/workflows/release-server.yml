name: Build Server Release

on:
  push:
    tags:
      - 'server/v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 1.0.0)'
        required: true
        default: '1.0.0'
      release_note:
        description: '更新说明'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build-server:
    name: Build Server
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: 'x64'
      
      - name: Get version
        id: get_version
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like "refs/tags/server/v*") {
            $version = $env:GITHUB_REF -replace 'refs/tags/server/v', ''
          } elseif ($env:INPUT_VERSION) {
            $version = $env:INPUT_VERSION
          } else {
            $version = "1.0.0"
          }
          Write-Output "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Output "Version: $version"
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
      
      - name: Update version files
        shell: pwsh
        run: |
          $version = "${{ steps.get_version.outputs.version }}"
          $buildDate = Get-Date -Format "yyyy-MM-dd"
          
          # 更新服务端 version.json
          if (Test-Path "backend/version.json") {
            $serverVer = Get-Content "backend/version.json" -Raw -Encoding utf8 | ConvertFrom-Json
            $serverVer.version = $version
            $serverVer.build_date = $buildDate
            $serverVer | ConvertTo-Json -Depth 10 | Set-Content "backend/version.json" -Encoding utf8
          }
          
          Write-Output "Version updated to $version"
      
      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          cd backend
          pip install -r requirements.txt
      
      - name: Build with PyInstaller
        shell: pwsh
        run: |
          cd backend
          pyinstaller PI-Manager-Server.spec --clean --noconfirm
      
      - name: Generate SHA256
        shell: pwsh
        run: |
          $version = "${{ steps.get_version.outputs.version }}"
          $srcDir = "backend/dist/PI-Manager-Server"
          $zipName = "PI-Manager-Server-v$version-win-x64.zip"

          Compress-Archive -Path $srcDir -DestinationPath $zipName -Force

          $hash = Get-FileHash -Path $zipName -Algorithm SHA256
          $hash.Hash | Out-File -FilePath "$zipName.sha256" -Encoding ascii

          Write-Output "Created: $zipName"
          Write-Output "SHA256: $($hash.Hash)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-build
          path: |
            *.zip
            *.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "server/v${{ steps.get_version.outputs.version }}"
          tag_name: "server/v${{ steps.get_version.outputs.version }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            PI-Manager-Server-v${{ steps.get_version.outputs.version }}-win-x64.zip
            PI-Manager-Server-v${{ steps.get_version.outputs.version }}-win-x64.zip.sha256

      - name: Publish to Update Service
        if: env.UPDATE_SERVICE_URL != ''
        env:
          UPDATE_SERVICE_URL: ${{ secrets.UPDATE_SERVICE_URL }}
          UPDATE_SERVICE_TOKEN: ${{ secrets.UPDATE_SERVICE_TOKEN }}
        run: |
          TAG="server/v${{ steps.get_version.outputs.version }}"
          RELEASE_NOTE="${{ github.event.inputs.release_note || '新版本发布' }}"
          
          echo "Publishing server version $TAG to update service..."
          
          curl -s -X POST "$UPDATE_SERVICE_URL/api/admin/release" \
            -H "X-Admin-Token: $UPDATE_SERVICE_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "tag": "'"$TAG"'",
              "component": "server",
              "changelog": "'"$RELEASE_NOTE"'",
              "force_update": false
            }'
          echo ""
          echo "Publish complete."