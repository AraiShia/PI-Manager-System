name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 1.0.0)'
        required: true
        default: '1.0.0'
      release_note:
        description: '更新说明'
        required: false
        default: ''
      force_update:
        description: '是否强制更新'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Release
    runs-on: windows-latest
    strategy:
      matrix:
        target: [client, server]
    
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: 'x64'
      
      - name: Get version
        id: get_version
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like "refs/tags/v*") {
            $version = $env:GITHUB_REF -replace 'refs/tags/v', ''
          } elseif ($env:INPUT_VERSION) {
            $version = $env:INPUT_VERSION
          } else {
            $version = "1.0.0"
          }
          Write-Output "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Output "Version: $version"
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
      
      - name: Update version files
        shell: pwsh
        run: |
          $version = "${{ steps.get_version.outputs.version }}"
          $buildDate = Get-Date -Format "yyyy-MM-dd"
          
          # 更新客户端 config.py
          $configPath = "client/config.py"
          $content = Get-Content $configPath -Raw -Encoding utf8
          $content = $content -replace 'APP_VERSION\s*=\s*"v?[\d.]+"', "APP_VERSION = `"v$version`""
          Set-Content -Path $configPath -Value $content -Encoding utf8
          
          # 更新客户端 version.json
          if (Test-Path "client/version.json") {
            $clientVer = Get-Content "client/version.json" -Raw -Encoding utf8 | ConvertFrom-Json
            $clientVer.version = $version
            $clientVer.build_date = $buildDate
            $clientVer | ConvertTo-Json -Depth 10 | Set-Content "client/version.json" -Encoding utf8
          }
          
          # 更新服务端 version.json
          if (Test-Path "backend/version.json") {
            $serverVer = Get-Content "backend/version.json" -Raw -Encoding utf8 | ConvertFrom-Json
            $serverVer.version = $version
            $serverVer.build_date = $buildDate
            $serverVer | ConvertTo-Json -Depth 10 | Set-Content "backend/version.json" -Encoding utf8
          }
          
          Write-Output "Version updated to $version"
      
      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          
          if ("${{ matrix.target }}" -eq "client") {
            cd client
            pip install -r requirements.txt
          } else {
            cd backend
            pip install -r requirements.txt
          }
      
      - name: Build with PyInstaller
        shell: pwsh
        run: |
          if ("${{ matrix.target }}" -eq "client") {
            cd client
            pyinstaller client.spec --clean --noconfirm
          } else {
            cd backend
            pyinstaller PI-Manager-Server.spec --clean --noconfirm
          }
      
      - name: Generate SHA256
        shell: pwsh
        run: |
          $version = "${{ steps.get_version.outputs.version }}"
          
          if ("${{ matrix.target }}" -eq "client") {
            $srcDir = "client/dist/PI_Manager_Client_v2"
            $zipName = "PI-Manager-Client-v$version-win-x64.zip"
          } else {
            $srcDir = "backend/dist/PI-Manager-Server"
            $zipName = "PI-Manager-Server-v$version-win-x64.zip"
          }
          
          Compress-Archive -Path $srcDir -DestinationPath $zipName -Force
          
          # 生成 SHA256
          $hash = Get-FileHash -Path $zipName -Algorithm SHA256
          $hash.Hash | Out-File -FilePath "$zipName.sha256" -Encoding ascii
          
          Write-Output "Created: $zipName"
          Write-Output "SHA256: $($hash.Hash)"
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-build
          path: |
            *.zip
            *.sha256

  release:
    name: Publish Release
    needs: build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Download client build
        uses: actions/download-artifact@v4
        with:
          name: client-build
          path: ./release
      
      - name: Download server build
        uses: actions/download-artifact@v4
        with:
          name: server-build
          path: ./release
      
      - name: List release files
        run: |
          ls -la ./release/
          echo "---"
          for f in ./release/*.sha256; do
            echo "SHA256 ($f):"
            cat "$f"
          done
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ needs.build-windows.outputs.version }}"
          tag_name: "v${{ needs.build-windows.outputs.version }}"
          draft: false
          prerelease: false
          files: |
            ./release/*.zip
            ./release/*.sha256
          body: |
            # PI Manager v${{ needs.build-windows.outputs.version }}
            
            ${{ github.event.inputs.release_note || '新版本发布，请更新使用。' }}
            
            ## 下载说明
            
            | 文件 | 说明 | SHA256 |
            |------|------|--------|
            | PI-Manager-Client-v${{ needs.build-windows.outputs.version }}-win-x64.zip | 客户端 | [查看](./PI-Manager-Client-v${{ needs.build-windows.outputs.version }}-win-x64.zip.sha256) |
            | PI-Manager-Server-v${{ needs.build-windows.outputs.version }}-win-x64.zip | 服务端 | [查看](./PI-Manager-Server-v${{ needs.build-windows.outputs.version }}-win-x64.zip.sha256) |
      
      - name: Publish to Update Service
        if: env.UPDATE_SERVICE_URL != ''
        env:
          UPDATE_SERVICE_URL: ${{ secrets.UPDATE_SERVICE_URL }}
          UPDATE_SERVICE_TOKEN: ${{ secrets.UPDATE_SERVICE_TOKEN }}
        run: |
          TAG="v${{ needs.build-windows.outputs.version }}"
          FORCE_UPDATE="${{ github.event.inputs.force_update || 'false' }}"
          RELEASE_NOTE="${{ github.event.inputs.release_note || '新版本发布' }}"
          
          echo "Publishing version $TAG to update service..."
          
          # 发布客户端
          echo "Publishing client..."
          curl -s -X POST "$UPDATE_SERVICE_URL/api/admin/release" \
            -H "X-Admin-Token: $UPDATE_SERVICE_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "tag": "'"$TAG"'",
              "component": "client",
              "changelog": "'"$RELEASE_NOTE"'",
              "force_update": '$FORCE_UPDATE'
            }'
          echo ""
          
          # 发布服务端
          echo "Publishing server..."
          curl -s -X POST "$UPDATE_SERVICE_URL/api/admin/release" \
            -H "X-Admin-Token: $UPDATE_SERVICE_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "tag": "'"$TAG"'",
              "component": "server",
              "changelog": "'"$RELEASE_NOTE"'",
              "force_update": '$FORCE_UPDATE'
            }'
          echo ""
          
          echo "Publish complete."
